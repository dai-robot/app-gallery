<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" fill="none">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7f4ee"/>
      <stop offset="1" stop-color="#e8f2ef"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cfe4e0"/>
      <stop offset="1" stop-color="#b8d8d2"/>
    </linearGradient>
  </defs>

  <rect width="640" height="400" fill="url(#sky)"/>
  <rect x="0" y="250" width="640" height="150" fill="url(#sea)" opacity="0.75"/>

  <path d="M0 268 Q120 252 240 268 T480 268 T640 268" stroke="#9fc7c0" stroke-width="3" stroke-dasharray="12 10" stroke-linecap="round"/>
  <path d="M0 292 Q100 278 200 292 T400 292 T640 292" stroke="#7fa8a0" stroke-width="2.5" stroke-dasharray="10 8" stroke-linecap="round" opacity="0.8"/>
  <path d="M0 318 Q160 304 320 318 T640 318" stroke="#6a9690" stroke-width="2" stroke-dasharray="8 7" stroke-linecap="round" opacity="0.55"/>

  <!-- simple drift bottle -->
  <g transform="translate(268 72) rotate(-6)">
    <!-- cork -->
    <rect x="44" y="0" width="32" height="22" rx="6" fill="#e7c9a9" stroke="#b9966e" stroke-width="2.5"/>
    <!-- neck -->
    <path d="M52 22 H68 V48 H52 Z" fill="#dff0ec" stroke="#7fa8a0" stroke-width="3" stroke-linejoin="round"/>
    <!-- body -->
    <path
      d="M28 48 C28 48 24 72 24 108 C24 168 36 196 60 196 C84 196 96 168 96 108 C96 72 92 48 92 48 Z"
      fill="#eef8f5"
      fill-opacity="0.92"
      stroke="#7fa8a0"
      stroke-width="3.5"
      stroke-linejoin="round"
    />
    <!-- letter inside -->
    <rect x="38" y="98" width="44" height="52" rx="5" fill="#fff" stroke="#cdbfa6" stroke-width="2"/>
    <path d="M44 112 H76 M44 128 H76 M44 144 H62" stroke="#cdbfa6" stroke-width="2.2" stroke-linecap="round"/>
    <!-- highlight -->
    <path d="M34 72 C38 68 42 90 38 118" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.65"/>
  </g>

  <!-- tiny sparkles -->
  <circle cx="180" cy="120" r="3" fill="#bcd6cf" opacity="0.7"/>
  <circle cx="460" cy="96" r="2.5" fill="#bcd6cf" opacity="0.55"/>
  <circle cx="520" cy="210" r="2" fill="#ffffff" opacity="0.6"/>
</svg>
